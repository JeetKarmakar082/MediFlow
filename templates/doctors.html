{% extends "base.html" %}
{% block title %}Doctors — MediFlow{% endblock %}

{% block content %}
<div class="mb-6 flex items-center justify-between">
  <div>
    <h1 class="text-2xl font-bold text-slate-800">Doctors</h1>
    <p class="text-slate-500 text-sm mt-1">Manage doctor profiles and availability</p>
  </div>
  <button onclick="openModal('doctor-modal')" class="flex items-center gap-2 bg-blue-600 hover:bg-blue-700 text-white px-4 py-2.5 rounded-xl text-sm font-medium transition-colors">
    <i class="fas fa-plus"></i> Add Doctor
  </button>
</div>

<!-- Availability Summary -->
<div class="grid grid-cols-1 sm:grid-cols-3 gap-4 mb-6">
  <div class="bg-white rounded-2xl p-5 shadow-sm border border-slate-100 flex items-center gap-4">
    <div class="w-12 h-12 bg-green-100 rounded-xl flex items-center justify-center">
      <i class="fas fa-user-md text-green-600 text-xl"></i>
    </div>
    <div>
      <p class="text-2xl font-bold text-slate-800" id="doc-available-count">—</p>
      <p class="text-sm text-slate-500">Available Now</p>
    </div>
  </div>
  <div class="bg-white rounded-2xl p-5 shadow-sm border border-slate-100 flex items-center gap-4">
    <div class="w-12 h-12 bg-slate-100 rounded-xl flex items-center justify-center">
      <i class="fas fa-user-slash text-slate-500 text-xl"></i>
    </div>
    <div>
      <p class="text-2xl font-bold text-slate-800" id="doc-unavailable-count">—</p>
      <p class="text-sm text-slate-500">Unavailable</p>
    </div>
  </div>
  <div class="bg-white rounded-2xl p-5 shadow-sm border border-slate-100 flex items-center gap-4">
    <div class="w-12 h-12 bg-blue-100 rounded-xl flex items-center justify-center">
      <i class="fas fa-hospital text-blue-600 text-xl"></i>
    </div>
    <div>
      <p class="text-2xl font-bold text-slate-800" id="doc-total-count">—</p>
      <p class="text-sm text-slate-500">Total Doctors</p>
    </div>
  </div>
</div>

<!-- Doctors Grid -->
<div id="doctors-grid" class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-5">
  <div class="col-span-full text-center py-16 text-slate-400">
    <i class="fas fa-spinner fa-spin text-3xl mb-3 block"></i>
    Loading doctors...
  </div>
</div>

<!-- Add Doctor Modal -->
<div id="doctor-modal" class="fixed inset-0 bg-black/50 z-50 hidden flex items-center justify-center p-4">
  <div class="bg-white rounded-2xl shadow-2xl w-full max-w-lg max-h-[90vh] overflow-y-auto">
    <div class="p-6 border-b border-slate-100 flex items-center justify-between">
      <h3 class="font-bold text-lg text-slate-800">Add New Doctor</h3>
      <button onclick="closeModal('doctor-modal')" class="text-slate-400 hover:text-slate-600">
        <i class="fas fa-times text-xl"></i>
      </button>
    </div>
    <form id="doctor-form" class="p-6 space-y-4">
      <div class="grid grid-cols-2 gap-4">
        <div class="col-span-2">
          <label class="block text-sm font-medium text-slate-700 mb-1">Full Name *</label>
          <input name="name" type="text" required class="w-full border border-slate-200 rounded-xl px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="Dr. Full Name" />
        </div>
        <div>
          <label class="block text-sm font-medium text-slate-700 mb-1">Specialization *</label>
          <select name="specialization" required class="w-full border border-slate-200 rounded-xl px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
            <option value="">Select</option>
            <option value="general">General Medicine</option>
            <option value="emergency">Emergency</option>
            <option value="cardiology">Cardiology</option>
            <option value="orthopedics">Orthopedics</option>
            <option value="pediatrics">Pediatrics</option>
            <option value="neurology">Neurology</option>
            <option value="gynecology">Gynecology</option>
            <option value="surgery">Surgery</option>
            <option value="other">Other</option>
          </select>
        </div>
        <div>
          <label class="block text-sm font-medium text-slate-700 mb-1">Department *</label>
          <select name="department" required id="dept-select" class="w-full border border-slate-200 rounded-xl px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
            <option value="">Loading departments...</option>
          </select>
        </div>
        <div>
          <label class="block text-sm font-medium text-slate-700 mb-1">Phone *</label>
          <input name="phone" type="tel" required class="w-full border border-slate-200 rounded-xl px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="Phone number" />
        </div>
        <div>
          <label class="block text-sm font-medium text-slate-700 mb-1">Registration No. *</label>
          <input name="registration_number" type="text" required class="w-full border border-slate-200 rounded-xl px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="MCI/State Reg. No." />
        </div>
      </div>
      <div id="doctor-form-error" class="hidden text-sm text-red-600 bg-red-50 px-3 py-2 rounded-lg"></div>
      <div class="flex gap-3 pt-2">
        <button type="button" onclick="closeModal('doctor-modal')" class="flex-1 border border-slate-200 text-slate-600 py-2.5 rounded-xl text-sm font-medium hover:bg-slate-50">Cancel</button>
        <button type="submit" class="flex-1 bg-blue-600 hover:bg-blue-700 text-white py-2.5 rounded-xl text-sm font-medium transition-colors">Add Doctor</button>
      </div>
    </form>
  </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
  const specColors = {
    general: 'bg-blue-100 text-blue-700',
    emergency: 'bg-red-100 text-red-700',
    cardiology: 'bg-pink-100 text-pink-700',
    orthopedics: 'bg-orange-100 text-orange-700',
    pediatrics: 'bg-yellow-100 text-yellow-700',
    neurology: 'bg-purple-100 text-purple-700',
    gynecology: 'bg-rose-100 text-rose-700',
    surgery: 'bg-green-100 text-green-700',
    other: 'bg-slate-100 text-slate-700',
  };

  async function loadDoctors() {
    const res = await apiFetch('/api/doctors/');
    if (!res) return;
    const data = await res.json();
    const doctors = data.results || data;

    const available = doctors.filter(d => d.is_available).length;
    document.getElementById('doc-available-count').textContent = available;
    document.getElementById('doc-unavailable-count').textContent = doctors.length - available;
    document.getElementById('doc-total-count').textContent = doctors.length;

    const grid = document.getElementById('doctors-grid');
    if (!doctors.length) {
      grid.innerHTML = '<div class="col-span-full text-center py-16 text-slate-400"><i class="fas fa-user-md text-4xl mb-3 block opacity-30"></i>No doctors added yet</div>';
      return;
    }

    grid.innerHTML = doctors.map(d => `
      <div class="bg-white rounded-2xl shadow-sm border border-slate-100 p-5 card-hover">
        <div class="flex items-start justify-between mb-4">
          <div class="flex items-center gap-3">
            <div class="w-12 h-12 bg-blue-100 rounded-xl flex items-center justify-center text-blue-600 font-bold text-lg">
              ${d.name.charAt(0).toUpperCase()}
            </div>
            <div>
              <p class="font-semibold text-slate-800">Dr. ${d.name}</p>
              <p class="text-xs text-slate-400">${d.registration_number}</p>
            </div>
          </div>
          <span class="flex items-center gap-1.5 text-xs font-medium px-2.5 py-1 rounded-full ${d.is_available ? 'bg-green-100 text-green-700' : 'bg-slate-100 text-slate-500'}">
            <span class="w-1.5 h-1.5 rounded-full ${d.is_available ? 'bg-green-500' : 'bg-slate-400'}"></span>
            ${d.is_available ? 'Available' : 'Unavailable'}
          </span>
        </div>
        <div class="space-y-2 mb-4">
          <div class="flex items-center gap-2">
            <span class="text-xs font-semibold px-2 py-0.5 rounded-full capitalize ${specColors[d.specialization] || specColors.other}">${d.specialization}</span>
          </div>
          <p class="text-sm text-slate-500 flex items-center gap-2">
            <i class="fas fa-building text-slate-300 w-4"></i> ${d.department}
          </p>
          <p class="text-sm text-slate-500 flex items-center gap-2">
            <i class="fas fa-phone text-slate-300 w-4"></i> ${d.phone}
          </p>
        </div>
        <button onclick="toggleAvailability(${d.id}, ${d.is_available})"
          class="w-full py-2 rounded-xl text-sm font-medium transition-colors border ${d.is_available ? 'border-slate-200 text-slate-600 hover:bg-slate-50' : 'border-green-200 text-green-600 hover:bg-green-50'}">
          ${d.is_available ? 'Mark Unavailable' : 'Mark Available'}
        </button>
      </div>
    `).join('');
  }

  async function toggleAvailability(id) {
    await apiFetch(`/api/doctors/${id}/toggle-availability/`, { method: 'PATCH' });
    loadDoctors();
  }

  document.getElementById('doctor-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const fd = new FormData(e.target);
    const body = {};
    fd.forEach((v, k) => body[k] = isNaN(v) || v === '' ? v : Number(v));
    const res = await apiFetch('/api/doctors/', { method: 'POST', body: JSON.stringify(body) });
    if (res.ok) {
      closeModal('doctor-modal');
      e.target.reset();
      loadDoctors();
    } else {
      const err = await res.json();
      const errEl = document.getElementById('doctor-form-error');
      errEl.textContent = JSON.stringify(err);
      errEl.classList.remove('hidden');
    }
  });

  function openModal(id) {
    document.getElementById(id).classList.remove('hidden');
    if (id === 'doctor-modal') {
      apiFetch('/api/departments/').then(r => r && r.json()).then(data => {
        if (!data) return;
        const depts = data.results || data;
        const sel = document.getElementById('dept-select');
        sel.innerHTML = '<option value="">Select department</option>' +
          depts.map(d => `<option value="${d.id}">${d.name}</option>`).join('');
      });
    }
  }
  function closeModal(id) { document.getElementById(id).classList.add('hidden'); }

  loadDoctors();
</script>
{% endblock %}
